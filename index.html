* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f5f5f5;
  color: #333;
  padding: 0;
  line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  padding: 20px 16px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.header .progress { font-size: 13px; margin-top: 6px; opacity: 0.9; }
.container {
  max-width: 640px; margin: 0 auto; padding: 16px;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 24px 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: none;
}
.card.active { display: block; }
.q-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
  font-size: 14px;
  color: #888;
}
.q-header .q-type {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
}
.q-type.choice { background: #e8f4fd; color: #1976d2; }
.q-type.judge { background: #fff3e0; color: #e65100; }
.q-body { font-size: 16px; margin-bottom: 18px; }
.q-body .katex { font-size: 1.05em; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 10px 14px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.option:hover { border-color: #90caf9; background: #f5faff; }
.option.selected { border-color: #1976d2; background: #e3f2fd; color: #1565c0; }
.option.correct { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.option.wrong { border-color: #f44336; background: #ffebee; color: #c62828; }
.option.show-correct { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.option .opt-label { font-weight: 600; margin-right: 6px; }

.judge-options { display: flex; gap: 12px; }
.judge-options .option { flex: 1; text-align: center; font-weight: 600; }

.actions {
  display: flex; gap: 10px; margin-top: 20px;
  flex-wrap: wrap;
}
.btn {
  flex: 1; min-width: 72px;
  padding: 10px 16px;
  border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: #1976d2; color: #fff; }
.btn-primary:hover { background: #1565c0; }
.btn-primary:disabled { background: #bbb; cursor: not-allowed; }
.btn-success { background: #43a047; color: #fff; }
.btn-success:hover { background: #388e3c; }
.btn-outline { background: transparent; color: #555; border: 1px solid #ccc; }
.btn-outline:hover { background: #f5f5f5; }
.btn-danger { background: #e53935; color: #fff; }
.btn-danger:hover { background: #c62828; }

.result-text {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  display: none;
}
.result-text.show { display: block; }
.result-text.result-right { background: #e8f5e9; color: #2e7d32; }
.result-text.result-wrong { background: #ffebee; color: #c62828; }
.result-text.result-info { background: #e3f2fd; color: #1565c0; }

.footer { text-align: center; padding: 24px 16px 40px; color: #999; font-size: 13px; }

@media (max-width: 480px) {
  body { font-size: 15px; }
  .card { padding: 18px 14px; }
  .option { padding: 12px; font-size: 15px; }
  .q-body { font-size: 15px; }
}
</style>

  {n:36,t:"j",q:"连续型随机变量取值可以一一列举",a:"×"},
  {n:37,t:"j",q:"向左平移 $\\varphi$ 个单位，解析式中 $x$ 替换为 $x+\\varphi$",a:"√"},
  {n:38,t:"j",q:"分类加法计数原理适用于分步骤完成事件",a:"×"},
  {n:39,t:"j",q:"报纸对折层数 2,4,8… 通项 $a_n=2^n$",a:"√"},
  {n:40,t:"j",q:"$C_{5}^2=C_{5}^3$",a:"√"}
];

// ========== App State ==========
const app = document.getElementById('app');
let order = [];
let current = 0;
let answered = {};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init() {
  order = shuffle(bank.map((_, i) => i));
  current = 0;
  answered = {};
  renderQuestion();
}

function getQ() { return bank[order[current]]; }

function renderQuestion() {
  const q = getQ();
  const idx = order[current];
  const isChoice = q.t === 'c';
  const total = bank.length;

  document.getElementById('currentIdx').textContent = current + 1;

  let html = '<div class="card active">';
  html += '<div class="q-header">';
  html += '<span class="q-type ' + (isChoice ? 'choice' : 'judge') + '">' + (isChoice ? '选择题' : '判断题') + '</span>';
  html += '<span>原题号 #' + q.n + '</span>';
  html += '</div>';
  html += '<div class="q-body">' + q.q + '</div>';

  if (isChoice) {
    html += '<div class="options" id="options">';
    const labels = ['A', 'B', 'C', 'D'];
    q.o.forEach(function(opt, i) {
      const val = labels[i];
      const sel = answered[idx] === val ? ' selected' : '';
      html += '<div class="option' + sel + '" data-val="' + val + '" onclick="selectOption(this, ' + idx + ', \'' + val + '\')">';
      html += '<span class="opt-label">' + val + '.</span>' + opt;
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="judge-options" id="options">';
    ['√','×'].forEach(function(val) {
      const sel = answered[idx] === val ? ' selected' : '';
      const label = val === '√' ? '✓ 正确' : '✗ 错误';
      html += '<div class="option' + sel + '" data-val="' + val + '" onclick="selectOption(this, ' + idx + ', \'' + val + '\')">' + label + '</div>';
    });
    html += '</div>';
  }

  html += '<div class="actions">';
  html += '<button class="btn btn-success" onclick="submitAnswer()" id="btnSubmit">提交答案</button>';
  html += '<button class="btn btn-outline" onclick="prevQuestion()"' + (current === 0 ? ' disabled' : '') + '>上一题</button>';
  html += '<button class="btn btn-outline" onclick="nextQuestion()"' + (current === total - 1 ? ' disabled' : '') + '>下一题</button>';
  html += '</div>';
  html += '<div class="result-text" id="result"></div>';
  html += '</div>';

  app.innerHTML = html;
  renderMath();
}

function selectOption(el, idx, val) {
  const parent = el.closest('#options');
  parent.querySelectorAll('.option').forEach(function(o) {
    o.classList.remove('selected', 'correct', 'wrong', 'show-correct');
  });
  el.classList.add('selected');
  answered[idx] = val;
  document.getElementById('result').classList.remove('show');
}

function submitAnswer() {
  const q = getQ();
  const idx = order[current];
  const chosen = answered[idx];
  const resultDiv = document.getElementById('result');
  const options = document.querySelectorAll('#options .option');

  if (!chosen) {
    resultDiv.textContent = '⚠️ 请先选择一个答案！';
    resultDiv.className = 'result-text show result-info';
    return;
  }

  let correct = chosen === q.a;

  options.forEach(function(o) {
    o.classList.remove('selected', 'correct', 'wrong', 'show-correct');
    if (o.dataset.val === q.a) o.classList.add('show-correct');
    if (o.dataset.val === chosen && correct) o.classList.add('correct');
    if (o.dataset.val === chosen && !correct) o.classList.add('wrong');
    if (o.dataset.val === chosen) o.classList.add('selected');
  });

  if (correct) {
    resultDiv.textContent = '✅ 回答正确！';
    resultDiv.className = 'result-text show result-right';
  } else {
    const ansText = q.t === 'c' ? q.a : (q.a === '√' ? '正确' : '错误');
    resultDiv.textContent = '❌ 回答错误。正确答案：' + ansText;
    resultDiv.className = 'result-text show result-wrong';
  }
}

function nextQuestion() {
  if (current < bank.length - 1) { current++; renderQuestion(); }
}

function prevQuestion() {
  if (current > 0) { current--; renderQuestion(); }
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextQuestion();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevQuestion();
  if (e.key === 'Enter') submitAnswer();
  if (e.key === '1') { var opt = document.querySelector('#options .option[data-val="A"]'); if(opt) opt.click(); }
  if (e.key === '2') { var opt = document.querySelector('#options .option[data-val="B"]'); if(opt) opt.click(); }
  if (e.key === '3') { var opt = document.querySelector('#options .option[data-val="C"]'); if(opt) opt.click(); }
  if (e.key === '4') { var opt = document.querySelector('#options .option[data-val="D"]'); if(opt) opt.click(); }
});

init();
</script>
</body>
</html>
